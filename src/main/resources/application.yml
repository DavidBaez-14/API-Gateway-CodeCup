server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin

      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns:
              - "http://localhost:5173"
              - "${FRONTEND_URL:https://codecup.games}"
            allowed-methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowed-headers:
              - "*"
            allow-credentials: true

      routes:

        # MS1 — Identidad / Auth
        # Rate limiting estricto: el endpoint de login/registro es el más
        # vulnerable a ataques de fuerza bruta. 60 req/min por IP.
        - id: ms1-identidad
          uri: ${MS1_URI:http://localhost:8081}
          predicates:
            - Path=/api/auth/**,/api/admin/**,/api/jugadores/**,/.well-known/**
          filters:
            - StripPrefix=0
            - name: RateLimiter
              args:
                capacity: 80
                refillTokens: 60
                refillDurationSeconds: 60

        # MS2 + MS3 — Supercopa + Finanzas
        # Rate limiting estándar: operaciones de torneo (consultas frecuentes
        # durante partidos en vivo). 200 req/min por IP.
        - id: ms2-ms3-supercopa-finanzas
          uri: ${MS2_URI:http://localhost:8082}
          predicates:
            - Path=/api/supercopa/**,/api/finanzas/**
          filters:
            - StripPrefix=0
            - name: RateLimiter
              args:
                capacity: 250
                refillTokens: 200
                refillDurationSeconds: 60

        # MS4 — Analytics
        # Rate limiting relajado: reportes y consultas analíticas son
        # menos frecuentes pero pueden ser pesadas. 120 req/min por IP.
        - id: ms4-analytics
          uri: ${MS4_URI:http://localhost:8084}
          predicates:
            - Path=/api/analytics/**
          filters:
            - StripPrefix=0
            - name: RateLimiter
              args:
                capacity: 160
                refillTokens: 120
                refillDurationSeconds: 60

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# Configuración de logging para ver los rechazos 429 en los logs de DO
logging:
  level:
    terminus.co.edu.ufps.gateway: INFO
    org.springframework.cloud.gateway: WARN
